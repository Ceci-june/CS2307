version: '3.4' # docker compose version

services:
  be-service:
    build:
      context: .
      dockerfile: ${PWD}/Dockerfile
    container_name: $CONTAINER_NAME
    image: $IMAGE_NAME
    working_dir: /app
    entrypoint: ["gunicorn", "server:app",'--workers', '5','--timeout', '1800', '--worker-class', 'uvicorn.workers.UvicornWorker', '--bind', '0.0.0.0:1605']
    ports:
      - "1605:1605"
    restart: always